<svg width="400" height="60" viewBox="0 0 400 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa40">
        <animate attributeName="offset" values="-1; 1" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#9c40ff">
        <animate attributeName="offset" values="0; 2" dur="3s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ffaa40">
        <animate attributeName="offset" values="1; 3" dur="3s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <style>
    .text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 24px;
      font-weight: 800;
      fill: url(#gradient);
    }
  </style>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text">
    ☕ 贊助與支持 ChroLens Project
  </text>
</svg>
